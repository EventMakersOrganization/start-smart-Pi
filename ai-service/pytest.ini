[pytest]
testpaths = tests
python_files = test_unit_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --strict-markers
    --cov=generation
    --cov=optimization
    --cov=core
    --cov=rag
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests that need live services
    unit: pure unit tests (no live stack)
