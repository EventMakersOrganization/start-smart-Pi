sonar.projectKey=start-smart-ai-service
sonar.projectName=StartSmart AI Service
sonar.projectVersion=1.0

sonar.sources=.
sonar.sourceEncoding=UTF-8
sonar.language=py

# Exclude test and non-source directories
sonar.exclusions=tests/**,chroma_db/**,logs/**,docs/**,**/__pycache__/**,*.log

# Test configuration
sonar.tests=tests
sonar.test.inclusions=tests/test_unit_*.py

# Coverage (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# JUnit test results (generated by pytest --junitxml)
sonar.python.xunit.reportPath=test-results.xml
