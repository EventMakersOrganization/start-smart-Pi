sonar.projectKey=start-smart-backend
sonar.projectName=StartSmart backend
sonar.projectVersion=1.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

# Specs excluded from main analysis; coverage still from Jest LCOV (avoid sonar.tests=src overlapping sources on SonarQube 26 + Scanner 8).
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/coverage/**

# Jest writes here when run from backend/ (see package.json jest.coverageDirectory)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info
