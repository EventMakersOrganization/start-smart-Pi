sonar.projectKey=start-smart-frontend
sonar.projectName=StartSmart Frontend
sonar.projectVersion=1.0

sonar.sources=src
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=src/environments/**,src/**/*.component.ts,src/**/*.component.html,src/**/*.component.css,src/**/*.pipe.ts,src/app/user-management/prosit-submission.service.ts,src/app/user-management/quiz-submission.service.ts,src/app/brainrush/services/socket.service.ts,src/app/codebattle/services/codebattle-socket.service.ts,src/app/brainrush/services/brainrush.service.ts,src/app/webinar/services/webinar.service.ts

# karma.conf.js: coverage/frontend + lcov reporter
sonar.javascript.lcov.reportPaths=coverage/frontend/lcov.info
sonar.typescript.lcov.reportPaths=coverage/frontend/lcov.info
