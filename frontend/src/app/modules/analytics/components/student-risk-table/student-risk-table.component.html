<div class="overflow-x-auto">
  <table class="w-full text-left border-collapse">
    <thead class="bg-surface-container-low">
      <tr>
        <th class="px-6 py-4 text-[11px] font-extrabold text-on-surface-variant uppercase tracking-widest">Name</th>
        <th class="px-6 py-4 text-[11px] font-extrabold text-on-surface-variant uppercase tracking-widest">Email</th>
        <th class="px-6 py-4 text-[11px] font-extrabold text-on-surface-variant uppercase tracking-widest">Risk Score</th>
        <th class="px-6 py-4 text-[11px] font-extrabold text-on-surface-variant uppercase tracking-widest">Risk Level</th>
        <th class="px-6 py-4 text-[11px] font-extrabold text-on-surface-variant uppercase tracking-widest">Alert Status</th>
      </tr>
    </thead>
    <tbody class="divide-y divide-outline-variant/10">
      <tr *ngFor="let student of students; trackBy: trackByStudentUserId" class="hover:bg-surface-container-low transition-colors">
        <td class="px-6 py-4 text-sm font-semibold text-on-surface">{{ student.name }}</td>
        <td class="px-6 py-4 text-sm text-on-surface-variant">{{ student.email }}</td>
        <td class="px-6 py-4 text-sm font-semibold">{{ student.riskScore }}%</td>
        <td class="px-6 py-4">
          <span [ngClass]="getRiskLevelClass(student.riskLevel)">{{ student.riskLevel | uppercase }}</span>
        </td>
        <td class="px-6 py-4">
          <span [ngClass]="getAlertStatusClass(student.alertStatus)">{{ student.alertStatus }}</span>
        </td>
      </tr>
      <tr *ngIf="students.length === 0">
        <td colspan="5" class="px-6 py-8 text-center text-sm text-on-surface-variant">No students found.</td>
      </tr>
    </tbody>
  </table>
</div>
