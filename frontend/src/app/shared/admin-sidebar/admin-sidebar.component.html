<aside

>

  <a
    routerLink="/admin/students"
    routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"

    class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors"
  >
    <span class="material-symbols-outlined">group</span>
    <span class="text-sm font-medium">Student Directory</span>
  </a>
  <a
    routerLink="/admin/instructors"
    routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20"

    <span class="material-symbols-outlined">menu_book</span>
    <span class="text-sm font-medium">Subjects</span>

  <a
    routerLink="/admin/classes"
    routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary dark:hover:bg-primary"

    <span class="material-symbols-outlined">insights</span>
    <span class="text-sm font-medium">Comprehensive analytics</span>

    routerLink="/admin/report-builder"

  >
    <span class="material-symbols-outlined">summarize</span>
    <span class="text-sm font-medium">Report builder</span>
  </a>
