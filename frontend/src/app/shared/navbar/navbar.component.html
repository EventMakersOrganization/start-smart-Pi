<header
  role="banner"
  class="h-16 border-b border-slate-200 dark:border-slate-800 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md sticky top-0 z-30 px-8 flex items-center justify-between gap-4 w-full shrink-0"
>
  <div class="shrink-0">
    <app-brand-logo [link]="homeLink" variant="compact" />
  </div>



  <div class="flex items-center gap-4">
    <button
      type="button"
      aria-label="Open notifications"
      class="p-2 text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full relative"
    >
      <span class="material-symbols-outlined">notifications</span>
      <span
        class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white"
      ></span>
    </button>
    <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700 mx-2"></div>
    <div class="flex items-center gap-3">
      <div class="text-right">
        <p class="text-sm font-bold leading-none">
          {{ user?.first_name }} {{ user?.last_name }}
        </p>
        <p class="text-xs text-primary font-medium capitalize mt-1">
          {{ user?.role }}
        </p>
      </div>
      <div class="flex items-center gap-2">
        <div
          class="w-10 h-10 rounded-full border-2 border-primary/20 bg-primary/10 flex items-center justify-center text-primary font-bold"
        >
          {{ user?.first_name?.[0] }}{{ user?.last_name?.[0] }}
        </div>
        <button
          (click)="onOpenProfile()"
          class="text-xs px-3 py-1 rounded-lg border border-slate-200 dark:border-slate-700 text-slate-700 dark:text-slate-200 hover:bg-slate-50 dark:hover:bg-slate-800"
        >
          Account
        </button>
        <button
          (click)="onLogout()"
          class="text-xs px-3 py-1 rounded-lg bg-red-500 text-white hover:bg-red-600"
        >
          Logout
        </button>
      </div>
    </div>
  </div>
</header>
