<!-- overall layout cribbed from provided HTML template -->
<div class="relative flex h-screen w-full flex-col overflow-hidden">
  <!-- Top Navigation Bar -->
  <app-navbar
    [user]="user"
    homeLink="/admin/students"
    searchPlaceholder="Search system..."
    (logoutRequest)="logout()"
    (profileSidebarRequest)="openProfileSidebar()"
  />


  <main id="main-content" tabindex="-1" class="flex flex-1 overflow-hidden min-h-0">
    <!-- Sidebar Navigation -->
    <app-admin-sidebar />

    <!-- Main Content Area -->
    <section
      aria-label="Admin content"
      class="flex-1 flex flex-col min-w-0 bg-background-light dark:bg-background-dark overflow-y-auto"
    >
      <router-outlet></router-outlet>
    </section>
  </main>
</div>

<!-- Profile Sidebar (copied for consistency) -->
<app-profile-sidebar
  [show]="showProfileSidebar"
  [user]="user"
  (close)="closeProfileSidebar()"
  (logout)="logout()"
  (manageAccount)="manageAccount()"
/>
