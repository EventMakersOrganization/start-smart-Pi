<!-- overall layout cribbed from provided HTML template -->
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
  <!-- Top Navigation Bar -->
  <header
    role="banner"
    class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 px-8 py-3 sticky top-0 z-50"
  >
    <div class="flex items-center gap-8">
      <div class="flex items-center gap-3 text-primary">
        <app-brand-logo [link]="'/admin/students'" variant="header" />
      </div>
      <!-- Brand/Logo is enough here -->
    </div>
    <div class="hidden lg:block flex-1 max-w-lg mx-auto">
      <!-- Global Search Placeholder if needed, or leave empty for cleaner look -->
    </div>
    <div class="flex items-center gap-3">
      <button class="p-2 rounded-lg bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 hover:bg-slate-200 dark:hover:bg-slate-700 relative">
        <span class="material-symbols-outlined">notifications</span>
        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full border-2 border-white dark:border-slate-900"></span>
      </button>
      <div class="h-8 w-[1px] bg-slate-200 dark:bg-slate-700 mx-1"></div>
      <div class="flex items-center gap-3 pl-2">
        <div class="text-right hidden sm:block">
          <p class="text-xs font-bold text-slate-900 dark:text-white leading-none">Admin User</p>
          <p class="text-[10px] text-slate-500 font-medium">System Manager</p>
        </div>
        <div class="h-10 w-10 rounded-full bg-primary/10 border-2 border-primary/20 flex items-center justify-center overflow-hidden">
          <img alt="Admin Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDIUNuxJ74m5srkH_YEIAG06evlqgTEcXJ8sGVEaNLmhIqaT8B_54V02kEhoIs7AB6TMqHVXoLroalZU_DrNkWE98rWr9SqorDSDoKM3gRBn0G0QSv3s2-jVidfD2jKPS1GwvWotHmevpraJKg04x60iJGaI5mTcK3nTAwPgffFvDvJl0OV77rOqZiXkF5l6M4cnSP3EHuoWAtkUzeVwiI63RoPGszUy8agka70uy14Wru3OHGuZKe5di4M3QODOsRZ13mqZX9MQL2V"/>
        </div>
        <button (click)="logout()" class="ml-2 px-2 py-1 text-xs bg-red-500 text-white rounded hover:bg-red-600">Logout</button>
      </div>
    </div>
  </header>

  <main id="main-content" tabindex="-1" class="flex flex-1 overflow-hidden">
    <!-- Sidebar Navigation -->
    <aside
      aria-label="Admin sidebar"
      class="w-64 border-r border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900 flex flex-col p-4 gap-2"
    >
      <div class="mb-4 px-2">
        <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Management</p>
      </div>
      <a routerLink="/admin/students" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: false }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">group</span>
        <span class="text-sm font-medium">Student Directory</span>
      </a>
      <a routerLink="/admin/instructors" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: false }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">person</span>
        <span class="text-sm font-medium">Instructor Directory</span>
      </a>
      <a routerLink="/admin/subjects" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: false }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">menu_book</span>
        <span class="text-sm font-medium">Subjects</span>
      </a>
      <a routerLink="/admin/classes" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20 hover:bg-primary dark:hover:bg-primary" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">groups</span>
        <span class="text-sm font-medium">Classes</span>
      </a>
      <a routerLink="/admin/system-metrics" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">monitoring</span>
        <span class="text-sm font-medium">System metrics</span>
      </a>
      <a routerLink="/admin/comprehensive-analytics" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">insights</span>
        <span class="text-sm font-medium">Comprehensive analytics</span>
      </a>
      <a routerLink="/admin/report-builder" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">summarize</span>
        <span class="text-sm font-medium">Report builder</span>
      </a>
      <a routerLink="/admin/explainability" routerLinkActive="bg-primary text-white shadow-lg shadow-primary/20" [routerLinkActiveOptions]="{ exact: true }" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-600 dark:text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
        <span class="material-symbols-outlined">psychology</span>
        <span class="text-sm font-medium">Explainability</span>
      </a>
    </aside>

    <!-- Main Content Area -->
    <section
      aria-label="Admin content"
      class="flex-1 flex flex-col min-w-0 bg-background-light dark:bg-background-dark"
    >
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
