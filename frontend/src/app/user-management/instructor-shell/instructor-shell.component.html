<div
  class="flex flex-col h-screen overflow-hidden bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100"
>
  <app-navbar
    [user]="user"
    homeLink="/instructor/dashboard"
    searchPlaceholder="Search students or metrics..."
    (logoutRequest)="logout()"
    (profileSidebarRequest)="openProfileSidebar()"
  />


  <div class="flex flex-1 overflow-hidden min-h-0">
    <app-instructor-sidebar />


    <main
      id="main-content"
      tabindex="-1"
      class="flex-1 overflow-y-auto min-w-0 bg-background-light dark:bg-background-dark"
    >
      <router-outlet></router-outlet>
    </main>
  </div>

  <div class="fixed bottom-8 right-8 z-40">
    <button
      type="button"
      routerLink="/instructor/chat/ai"
      class="w-14 h-14 bg-primary text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 hover:bg-blue-700 transition-all group relative"
    >
      <span class="material-symbols-outlined text-3xl">psychology</span>
      <div
        class="absolute bottom-full right-0 mb-4 bg-slate-900 text-white text-[10px] font-bold py-1 px-3 rounded-lg opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity"
      >
        ASK EDU AI
      </div>
    </button>
  </div>
</div>

<app-profile-sidebar
  [show]="showProfileSidebar"
  [user]="user"
  (close)="closeProfileSidebar()"
  (logout)="logout()"
  (manageAccount)="manageAccount()"
/>
