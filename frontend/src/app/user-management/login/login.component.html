<div class="flex w-full min-h-screen">
  <!-- left side branding panel, hidden on small screens -->
  <div
    class="hidden lg:flex lg:w-1/2 relative flex-col justify-center items-center p-12 bg-sidebar-dark overflow-hidden"
  >
    <div class="absolute inset-0 z-0 opacity-30">
      <div
        class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute bottom-[-10%] right-[-10%] w-[400px] h-[400px] bg-blue-600 rounded-full blur-[100px]"
      ></div>
    </div>
    <div class="relative z-10 max-w-lg text-center">
      <div class="mb-12 flex justify-center">
        <app-brand-logo variant="auth" [link]="null" />
      </div>
      <div
        class="aspect-video w-full mb-12 bg-cover bg-center rounded-2xl shadow-2xl border border-white/10"
        data-alt="Students collaborating on laptops"
        style="
          background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuAUQ1Use5Jl6sBDEc4PdWHXZuahOgvUwYazmjv3HDsvQzwPAHJiVlViOUcihJbOV3YQ_A-Qv6Ur5q-xQf1Ap5tFZEibGIN2GbIpQXParBD_UNfw5j0RvSLFzL0_e_0-7c2DgtIoZMa_LnEpn8v6npqmWqaq5ycHpZ1p9HkX8-_30KVrecXXOgg0pMytqY6El4CaFE8Q0hcyOqTsJ7Gaj-7GYDc7iH1j91UC5-bNRG-scYIxTegIjrOmr94RlwJ394uIsX_VsZSC3K6o&quot;);
        "
      ></div>
      <div class="space-y-6">
        <p class="text-2xl font-medium leading-relaxed italic text-slate-200">
          "The beautiful thing about learning is that nobody can take it away
          from you."
        </p>
        <div class="flex items-center justify-center gap-2">
          <span class="h-px w-8 bg-primary"></span>
          <p class="text-primary font-bold tracking-wider uppercase text-sm">
            B.B. King
          </p>
          <span class="h-px w-8 bg-primary"></span>
        </div>
      </div>
    </div>
    <div class="absolute bottom-8 left-12 flex gap-6 text-sm text-slate-500">
      <a class="hover:text-primary transition-colors" href="#"
        >Privacy Policy</a
      >
      <a class="hover:text-primary transition-colors" href="#"
        >Terms of Service</a
      >
    </div>
  </div>

  <!-- right side login form -->
  <div
    class="w-full lg:w-1/2 flex items-center justify-center p-6 sm:p-12 md:p-20 bg-background-light dark:bg-background-dark overflow-y-auto"
  >
    <div class="w-full max-w-md space-y-8 py-8">
      <div class="flex justify-center lg:hidden mb-2">
        <app-brand-logo variant="compact" [link]="null" />
      </div>
      <div class="text-center lg:text-left">
        <h2
          class="text-3xl font-bold tracking-tight text-slate-900 dark:text-slate-100"
        >
          Sign in to your account
        </h2>
        <p class="mt-2 text-slate-600 dark:text-slate-400 font-medium">
          Welcome back! Please login to your account.
        </p>
      </div>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <div class="space-y-1">
          <label
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
            for="email"
            >Email address (required)</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <span class="material-symbols-outlined text-slate-400 text-xl"
                >mail</span
              >
            </div>
            <input
              autocomplete="email"
              formControlName="email"
              id="email"
              required
              aria-required="true"
              type="email"
              class="block w-full pl-10 pr-3 py-3 border border-slate-300 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900/80 text-slate-900 dark:text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm"
              placeholder="name@esprit.tn"
            />
          </div>
        </div>
        <div class="space-y-1">
          <label
            class="block text-sm font-semibold text-slate-700 dark:text-slate-300"
            for="password"
            >Password (required)</label
          >
          <div class="relative">
            <div
              class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none"
            >
              <span class="material-symbols-outlined text-slate-400 text-xl"
                >lock</span
              >
            </div>
            <input
              autocomplete="current-password"
              formControlName="password"
              id="password"
              required
              aria-required="true"
              [type]="showPassword ? 'text' : 'password'"
              class="block w-full pl-10 pr-10 py-3 border border-slate-300 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900/80 text-slate-900 dark:text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all sm:text-sm"
              placeholder="••••••••"
            />
            <button
              type="button"
              [attr.aria-label]="
                showPassword ? 'Hide password' : 'Show password'
              "
              class="absolute inset-y-0 right-0 pr-3 flex items-center cursor-pointer group"
              (click)="togglePassword()"
            >
              <span
                class="material-symbols-outlined text-slate-400 text-xl group-hover:text-slate-600 transition-colors"
                >{{ showPassword ? "visibility_off" : "visibility" }}</span
              >
            </button>
          </div>
        </div>

        <!-- forgot password link -->
        <div class="flex items-center justify-end text-sm">
          <a
            routerLink="/forgot-password"
            class="font-semibold text-primary hover:text-primary/80 hover:underline"
          >
            Forgot your password?
          </a>
        </div>

        <button
          class="group relative w-full flex justify-center py-4 px-4 border border-transparent text-sm font-bold rounded-xl text-white bg-primary hover:bg-primary/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all shadow-lg shadow-primary/20"
          type="submit"
          [disabled]="!loginForm.valid || isSubmitting"
        >
          Login
        </button>
      </form>
      <p
        *ngIf="errorMessage"
        class="text-red-500 text-center"
        role="alert"
        aria-live="assertive"
      >
        {{ errorMessage }}
      </p>

      <!-- social login divider -->
      <div class="relative">
        <div aria-hidden="true" class="absolute inset-0 flex items-center">
          <div
            class="w-full border-t border-slate-300 dark:border-slate-800"
          ></div>
        </div>
        <div class="relative flex justify-center text-sm">
          <span
            class="px-4 bg-background-light dark:bg-background-dark text-slate-500 font-medium"
            >Or continue with</span
          >
        </div>
      </div>
      <div class="grid gap-4">
        <div
          id="googleButton"
          class="flex w-full items-center justify-center"
        ></div>
        <!-- placeholder for another provider if needed -->
      </div>
      <p class="mt-8 text-center text-sm text-slate-600 dark:text-slate-400">
        Don't have an account?
        <a routerLink="/register" class="font-bold text-primary hover:underline"
          >Sign up</a
        >
      </p>
    </div>
  </div>
</div>
