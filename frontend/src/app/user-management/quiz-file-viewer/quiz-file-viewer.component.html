<div class="rounded-3xl bg-gradient-to-br from-blue-50 via-white to-indigo-100 shadow-xl p-0 mb-8">
  <div class="flex items-center gap-4 px-8 pt-6 pb-2" *ngIf="!alreadySubmitted">
    <button
      class="px-4 py-2 rounded-xl font-bold text-blue-700 bg-white shadow border border-blue-100"
      [class.bg-blue-100]="activeTab === 'edit'"
      (click)="setTab('edit')"
      *ngIf="isDocx"
    >
      Répondre dans le document
    </button>
    <button
      class="px-4 py-2 rounded-xl font-bold text-blue-700 bg-white shadow border border-blue-100"
      [class.bg-blue-100]="activeTab === 'upload'"
      (click)="setTab('upload')"
    >
      Soumettre un fichier
    </button>
    <button
      class="px-4 py-2 rounded-xl font-bold text-blue-700 bg-white shadow border border-blue-100"
      [class.bg-blue-100]="activeTab === 'original'"
      (click)="setTab('original')"
      *ngIf="isDocx"
    >
      Voir l'original
    </button>
    <span class="ml-auto text-xs text-slate-400 font-bold">
      {{ content.fileName }}
    </span>
  </div>

  <div class="px-8 pb-8">
    <!-- SUBMITTED VIEW: Only show the submission content -->
    <div *ngIf="alreadySubmitted" class="py-4">
      <div class="mb-6 p-6 rounded-2xl bg-slate-50 border border-slate-100">
        <h4 class="text-slate-900 font-black uppercase tracking-widest text-xs mb-4 flex items-center gap-2">
          <span class="material-symbols-outlined text-primary">visibility</span>
          Aperçu de votre remise
        </h4>
        
        <!-- Preview of submitted content -->
        <div class="bg-white rounded-xl border border-slate-200 p-6 min-h-[300px] overflow-auto shadow-sm">
           <iframe *ngIf="showIframeFallback && existingSubmission?.fileUrl" 
             [src]="existingSubmission.fileUrl | safeUrl" 
             class="w-full h-[500px] border-none"></iframe>
           
           <div *ngIf="!showIframeFallback"
             id="submission-preview" class="prose prose-slate max-w-none"
             [innerHTML]="submissionHtml">
             <p *ngIf="!submissionHtml" class="text-slate-400 italic text-sm mb-4">Chargement de votre réponse...</p>
           </div>
        </div>
      </div>
    </div>

    <!-- TAB 1: Répondre dans le document (DOCX) -->
    <div *ngIf="activeTab === 'edit' && isDocx && !alreadySubmitted">
      <div class="flex flex-wrap items-center gap-2 mb-4 p-3 bg-white/50 rounded-2xl border border-blue-100 shadow-sm">
        <button (click)="execCommand('bold')" class="btn-toolbar" title="Gras">
          <span class="material-symbols-outlined text-[18px]">format_bold</span>
        </button>
        <button (click)="execCommand('italic')" class="btn-toolbar" title="Italique">
          <span class="material-symbols-outlined text-[18px]">format_italic</span>
        </button>
        <button (click)="execCommand('underline')" class="btn-toolbar" title="Souligné">
          <span class="material-symbols-outlined text-[18px]">format_underlined</span>
        </button>
        <div class="w-px h-6 bg-blue-100 mx-1"></div>
        <button (click)="highlightSelection()" class="btn-toolbar text-yellow-600" title="Surligner">
          <span class="material-symbols-outlined text-[18px]">stylus</span>
        </button>
        <button (click)="addComment()" class="btn-toolbar text-blue-600" title="Ajouter un commentaire">
          <span class="material-symbols-outlined text-[18px]">add_comment</span>
        </button>
        <button (click)="removeHighlights()" class="btn-toolbar text-rose-500" title="Effacer les annotations">
          <span class="material-symbols-outlined text-[18px]">ink_eraser</span>
        </button>
      </div>

      <div class="relative group">
        <div *ngIf="loading" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-white/80 backdrop-blur-sm rounded-[2rem]">
          <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-4"></div>
          <p class="text-blue-600 font-black uppercase tracking-widest text-[10px]">Chargement du document...</p>
        </div>
        <div #quizEditor contenteditable="true" 
          class="min-h-[500px] p-10 bg-white rounded-[2rem] border border-blue-100 shadow-inner focus:outline-none focus:ring-4 focus:ring-blue-500/10 transition-all prose prose-slate max-w-none">
        </div>
      </div>
    </div>

    <!-- TAB 2: Soumettre un fichier -->
    <div *ngIf="activeTab === 'upload' && !alreadySubmitted" class="py-10 text-center">
      <div class="max-w-md mx-auto p-10 rounded-[3rem] border-2 border-dashed border-blue-200 bg-blue-50/30 hover:bg-blue-50 transition-all group">
        <div class="w-20 h-20 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-6 group-hover:scale-110 transition-transform">
          <span class="material-symbols-outlined text-blue-600 text-4xl">cloud_upload</span>
        </div>
        <h3 class="text-xl font-black text-slate-800 mb-2">Déposez votre fichier</h3>
        <p class="text-sm text-slate-500 font-medium mb-8">Sélectionnez le document final de votre réponse.</p>
        
        <input type="file" (change)="onFileChange($event)" id="quiz-file-input" class="hidden">
        <label for="quiz-file-input" class="inline-flex items-center gap-3 px-8 py-4 bg-white border border-blue-200 rounded-2xl text-blue-600 font-black tracking-widest text-[10px] uppercase cursor-pointer hover:shadow-lg active:scale-95 transition-all">
          <span class="material-symbols-outlined text-[18px]">attach_file</span>
          {{ selectedFile ? selectedFile.name : 'Choisir un fichier' }}
        </label>
      </div>
    </div>

    <!-- TAB 3: Voir l'original -->
    <div *ngIf="activeTab === 'original' && isDocx && !alreadySubmitted">
      <div class="p-10 bg-slate-50 rounded-[2rem] border border-slate-200 prose prose-slate max-w-none shadow-inner" 
           [innerHTML]="originalHtml">
      </div>
    </div>

    <!-- Submit Button (Hidden if already submitted) -->
    <div class="mt-6 flex flex-col gap-4">

      <div class="flex items-center gap-4" *ngIf="!alreadySubmitted">
        <button
          (click)="submit()"
          [disabled]="loading"
          class="px-8 py-4 rounded-2xl bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-black tracking-widest text-xs shadow-lg hover:scale-105 transition-all disabled:opacity-50"
        >
          {{ loading ? 'ENVOI EN COURS...' : 'SOUMETTRE MA RÉPONSE' }}
        </button>
        <span *ngIf="submitError" class="text-rose-500 font-black text-[10px] uppercase tracking-widest animate-pulse">{{ submitError }}</span>
      </div>
    </div>
  </div>
</div>

<!-- Toolbar button style -->
<style>
.btn-toolbar {
  @apply px-2 py-1 rounded bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold shadow border border-blue-100 transition-all;
}
</style>
