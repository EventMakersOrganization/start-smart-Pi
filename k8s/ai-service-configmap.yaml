apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-config
  labels:
    app: ai-service
    part-of: start-smart
data:
  CHROMA_PERSIST_DIRECTORY: "./chroma_db"
  OLLAMA_MODEL: "mistral"
  OLLAMA_EMBED_MODEL: "nomic-embed-text"
  OLLAMA_FAST_MODEL: "qwen2.5:3b"
  OLLAMA_BASE_URL: "http://192.168.192.130:11434"
  REDIS_CACHE_PREFIX: "startsmart:resp"
  REDIS_URL: "redis://192.168.192.130:6379"
  DID_BASE_URL: "https://api.d-id.com"
  VIDEO_OUTPUT_DIR: "./generated_videos"
  MONGODB_URI: "mongodb://192.168.192.130:27017/user-management"
