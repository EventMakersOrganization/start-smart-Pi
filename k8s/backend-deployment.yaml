apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
    part-of: start-smart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: startsmart-api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: AI_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: backend-config
                  key: AI_SERVICE_URL
          envFrom:
            - secretRef:
                name: backend-secrets
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 20
