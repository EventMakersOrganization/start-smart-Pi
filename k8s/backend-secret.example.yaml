# Copy to backend-secret.yaml (do not commit real values), then:
#   kubectl apply -f backend-secret.yaml
#
# Or: kubectl create secret generic backend-secrets -n start-smart --from-env-file=backend.env
#
# Required keys depend on your Nest config; minimum for boot:
#   MONGODB_URI, JWT_SECRET
# Common optional: REDIS_URL, GOOGLE_CLIENT_ID, SMTP_*, FRONTEND_URL

apiVersion: v1
kind: Secret
metadata:
  name: backend-secrets
  namespace: start-smart
type: Opaque
stringData:
  MONGODB_URI: "mongodb://192.168.192.130:27017/user-management"
  JWT_SECRET: "change-me-to-a-long-random-string"
  # REDIS_URL: "redis://192.168.192.130:6379"
  # FRONTEND_URL: "http://192.168.192.130:30080"
