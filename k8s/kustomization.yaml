# Docker Hub: only slm334/startsmart-api and slm334/startsmart-web (cd-back + cd-front).
# ai-service: run on the VM host; set AI_SERVICE_URL in backend-config.yaml (VM LAN IP :8000).
#
# VM checklist (after IP / kube-proxy / NodePort are healthy):
#   1. docker compose -f docker-compose.vm-deps.yml up -d   (Mongo + Redis on the VM)
#   2. Run ai-service (uvicorn) on the VM; Ollama optional
#   3. kubectl create secret generic backend-secrets -n start-smart --from-env-file=...  (or apply example)
#   4. Update backend-config.yaml + secret URIs if DHCP changes the VM IP
#   5. kubectl apply -k k8s/
#   6. kubectl get pods -n start-smart; curl -I http://<node-ip>:30080
#
# Frontend nginx proxies /api, /uploads, /socket.io, /brainrush, /codebattle, /webinar to Service backend.
# Rebuild/push startsmart-web after frontend changes so the cluster gets the new image.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: start-smart

resources:
  - namespace.yaml
  - backend-config.yaml
  - backend-deployment.yaml
  - backend-service.yaml
  - frontend-deployment.yaml
  - frontend-service.yaml

images:
  - name: startsmart-api
    newName: slm334/startsmart-api
    newTag: latest
  - name: startsmart-web
    newName: slm334/startsmart-web
    newTag: latest
