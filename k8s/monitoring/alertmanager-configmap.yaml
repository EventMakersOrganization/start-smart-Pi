apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    app: alertmanager
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 1m

    route:
      receiver: default
      group_by: ['alertname', 'service']
      group_wait: 10s
      group_interval: 1m
      repeat_interval: 1h
      routes:
        - match:
            severity: critical
          receiver: default

    receivers:
      - name: default
        # Replace this null receiver with email/slack/webhook for real notifications.
        # Example webhook (uncomment and edit):
        # webhook_configs:
        #   - url: http://localhost:5001/

    inhibit_rules:
      - source_match: { severity: 'critical' }
        target_match: { severity: 'warning' }
        equal: ['alertname']
