apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-rules
  namespace: monitoring
  labels:
    app: prometheus
data:
  alert.rules.yml: |
    groups:
      - name: start-smart-backend
        rules:
          - alert: BackendDown
            expr: up{job="start-smart-backend"} == 0
            for: 1m
            labels:
              severity: critical
              service: nest-backend
            annotations:
              summary: "Backend is down (no successful scrape for 1m)"
              description: "Prometheus cannot scrape the Nest backend metrics endpoint."

          - alert: BackendHighMemory
            expr: process_resident_memory_bytes{job="start-smart-backend"} > 800 * 1024 * 1024
            for: 5m
            labels:
              severity: warning
              service: nest-backend
            annotations:
              summary: "Backend memory > 800 MiB"
              description: "process_resident_memory_bytes is sustained above 800 MiB."

          - alert: BackendHighCPU
            expr: rate(process_cpu_seconds_total{job="start-smart-backend"}[2m]) > 0.8
            for: 5m
            labels:
              severity: warning
              service: nest-backend
            annotations:
              summary: "Backend CPU rate > 0.8 cores"
              description: "Sustained CPU rate above 0.8 cores for 5 minutes."
